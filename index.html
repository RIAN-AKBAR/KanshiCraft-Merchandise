<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KanshiCraft | Kerajinan Tangan Modern — Dark Theme</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0a0a;
            color: #ece8e2;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1b19;
        }
        ::-webkit-scrollbar-thumb {
            background: #6a5a4b;
            border-radius: 10px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
        }

        /* Header */
        .header {
            padding: 24px 0;
            border-bottom: 1px solid #2a2622;
            background: rgba(11, 10, 10, 0.92);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo-img {
            width: 52px;
            height: 52px;
            object-fit: cover;
            border-radius: 20px;
            background: #2b2520;
            box-shadow: 0 6px 14px -6px rgba(0,0,0,0.5);
            border: 1px solid #4a3e34;
        }
        .logo-text h1 {
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f3e3d3, #c9aa8a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-text p {
            font-size: 0.8rem;
            color: #b7a58f;
            letter-spacing: 0.3px;
        }
        .nav-links {
            display: flex;
            gap: 32px;
        }
        .nav-links a {
            text-decoration: none;
            color: #e0d3c6;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-links a:hover {
            color: #e7bc91;
        }

        /* Banner Hero */
        .hero-banner {
            margin-top: 32px;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.6);
            background: #0f0d0b;
        }
        .hero-banner img {
            width: 100%;
            min-height: 380px;
            max-height: 580px;
            object-fit: contain;
            object-position: center center;
            background: #0a0908;
            display: block;
        }
        .hero-caption {
            text-align: center;
            margin-top: 24px;
            margin-bottom: 16px;
            font-size: 0.95rem;
            letter-spacing: 1px;
            color: #bba98e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .hero-caption span {
            background: #201c18;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        /* Tutorial Section */
        .tutorial-section {
            background: #13100e;
            border-radius: 40px;
            padding: 32px 28px;
            margin: 48px 0 32px;
            border: 1px solid #2f2822;
        }
        .tutorial-title {
            font-size: 1.6rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 28px;
            color: #e6bc91;
        }
        .tutorial-title i {
            margin-right: 12px;
        }
        .steps-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
        }
        .step-card {
            background: #1e1a17;
            border-radius: 28px;
            padding: 24px 20px;
            flex: 1;
            min-width: 180px;
            text-align: center;
            border: 1px solid #3a322b;
            transition: transform 0.2s;
        }
        .step-card:hover {
            transform: translateY(-5px);
            border-color: #6b5542;
        }
        .step-number {
            width: 48px;
            height: 48px;
            background: #e6bc91;
            color: #1e1712;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0 auto 16px;
        }
        .step-card h4 {
            font-size: 1.2rem;
            margin-bottom: 12px;
            color: #f1e2d4;
        }
        .step-card p {
            font-size: 0.85rem;
            color: #b6a28c;
            line-height: 1.5;
        }
        .step-card i {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: #e6bc91;
        }

        /* Product Grid */
        .section-title {
            font-size: 1.9rem;
            font-weight: 500;
            margin: 56px 0 32px 0;
            text-align: center;
            letter-spacing: -0.2px;
            position: relative;
            color: #f2e5da;
        }
        .section-title:after {
            content: '';
            display: block;
            width: 70px;
            height: 3px;
            background: #9b7b5c;
            margin: 12px auto 0;
            border-radius: 4px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 36px 28px;
            margin-bottom: 60px;
        }
        .product-card {
            background: #161311;
            border-radius: 32px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 15px 28px -12px rgba(0,0,0,0.5);
            border: 1px solid #2f2822;
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 28px 40px -14px rgba(0,0,0,0.7);
            border-color: #6b5542;
        }
        .product-img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            background: #2a231e;
            transition: transform 0.5s;
        }
        .product-card:hover .product-img {
            transform: scale(1.02);
        }
        .product-info {
            padding: 22px 20px 24px;
        }
        .product-title {
            font-size: 1.45rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #f1e2d4;
        }
        .product-desc {
            font-size: 0.85rem;
            color: #b6a28c;
            margin: 8px 0 12px;
            line-height: 1.4;
        }
        .price {
            font-weight: 700;
            font-size: 1.5rem;
            color: #e6bc91;
            margin: 12px 0 18px;
        }
        .stock-badge {
            display: inline-block;
            font-size: 0.7rem;
            background: #2a231f;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 12px;
            color: #b7a58f;
        }
        .buy-btn {
            display: inline-block;
            width: 100%;
            background: #2d2722;
            color: #f2e5da;
            border: 1px solid #4c3e33;
            padding: 14px 0;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 44px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }
        .buy-btn:hover:not(:disabled) {
            background: #c7a17a;
            color: #0b0a0a;
            border-color: #c7a17a;
            transform: scale(0.98);
        }
        .buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: #1e1a17;
            max-width: 500px;
            width: 90%;
            border-radius: 48px;
            padding: 32px 28px 36px;
            text-align: center;
            box-shadow: 0 40px 60px rgba(0,0,0,0.6);
            border: 1px solid #5c4a3a;
            animation: fadeUp 0.3s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-logo {
            width: 70px;
            height: 70px;
            border-radius: 40px;
            margin: 0 auto 16px;
            object-fit: cover;
            border: 2px solid #b4926e;
        }
        .modal-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 12px;
            color: #f2e2d2;
        }
        .order-summary {
            background: #2a231f;
            border-radius: 28px;
            padding: 18px;
            margin: 22px 0;
            font-size: 0.95rem;
            text-align: left;
            border-left: 5px solid #c7a17a;
            color: #ddd0c2;
        }
        .order-summary p {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
        }
        .message-box {
            background: #241f1b;
            border-radius: 24px;
            padding: 16px;
            margin: 16px 0;
            text-align: left;
            border: 1px solid #423a32;
        }
        .message-box label {
            font-size: 0.75rem;
            color: #c7a17a;
            display: block;
            margin-bottom: 8px;
        }
        .message-text {
            background: #0f0d0b;
            padding: 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-family: monospace;
            word-break: break-word;
            color: #e6d5c4;
            max-height: 150px;
            overflow-y: auto;
        }
        .copy-btn-small {
            background: #3b322c;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            margin-top: 10px;
            cursor: pointer;
            color: #e6bc91;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .confirm-btn, .cancel-btn {
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .confirm-btn {
            background: #e6bc91;
            color: #1e1712;
        }
        .confirm-btn:hover {
            background: #d4a77c;
        }
        .cancel-btn {
            background: #3b322c;
            color: #f0e0d0;
        }
        .cancel-btn:hover {
            background: #5a4b3e;
        }

        footer {
            margin-top: 70px;
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid #2f2822;
            color: #9c8b78;
            font-size: 0.85rem;
        }

        @media (max-width: 700px) {
            .container {
                padding: 0 20px;
            }
            .hero-banner img {
                min-height: 220px;
                max-height: 320px;
            }
            .steps-grid {
                flex-direction: column;
            }
        }
        
        .custom-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #2d2722;
            color: #f2e2d2;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            z-index: 1200;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            font-weight: 500;
            border-left: 3px solid #e6bc91;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <div class="logo-area">
            <img class="logo-img" id="logoImg" src="" alt="Kanshi Logo">
            <div class="logo-text">
                <h1 id="storeName">KanshiCraft Store<span style="font-weight:300">.</span></h1>
                <p id="storeTagline">Give & Merchandise</p>
            </div>
        </div>
        <div class="nav-links">
            <a href="#">Beranda</a>
            <a href="#products">Koleksi</a>
            <a href="#tutorial">Cara Pesan</a>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <div class="hero-banner">
            <img id="heroImage" src="" alt="Kanshi Banner Full Logo">
        </div>
        <div class="hero-caption" id="heroCaptions"></div>

        <div class="tutorial-section" id="tutorial">
            <div class="tutorial-title">
                <i class="fab fa-instagram"></i> Tutorial Pemesanan
            </div>
            <div class="steps-grid" id="stepsGrid"></div>
            <p style="text-align: center; margin-top: 24px; font-size: 0.8rem; color: #b7a58f;">
                <i class="fas fa-info-circle"></i> Setelah menekan tombol, pesan akan otomatis tersalin. Buka Instagram, tempel (paste) dan kirim!
            </p>
        </div>

        <div class="section-title" id="products">✦ Pilihan Karya Terbaik ✦</div>
        <div class="products-grid" id="productGrid"></div>
    </div>
</main>

<footer>
    <div class="container">
        <p id="footerText"></p>
        <p style="margin-top: 8px;" id="footerSubtext"></p>
    </div>
</footer>

<div id="orderModal" class="modal">
    <div class="modal-card">
        <img class="modal-logo" id="modalLogo" src="" alt="logo">
        <h3>🕊️ Kartu Pembeli</h3>
        <div class="order-summary" id="orderSummary"></div>
        <div class="message-box">
            <label><i class="fas fa-comment-dots"></i> Pesanan siap kirim ke Instagram:</label>
            <div class="message-text" id="fullMessageText"></div>
            <button class="copy-btn-small" id="copyMessageBtn"><i class="fas fa-copy"></i> 📋 Salin Pesan</button>
        </div>
        <div class="modal-buttons">
            <button class="confirm-btn" id="openIgBtn"><i class="fab fa-instagram"></i> ✨ Buka IG & Tempel ✨</button>
            <button class="cancel-btn" id="cancelModalBtn">Kembali</button>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script>
    // ============================================
    // CHECK MAINTENANCE MODE
    // ============================================
    if (typeof KANSHI_CONFIG !== 'undefined') {
        if (KANSHI_CONFIG.MAINTENANCE_MODE === true) {
            window.location.href = 'maintenance.html?eta=' + encodeURIComponent(KANSHI_CONFIG.MAINTENANCE_ETA);
        }
    } else {
        console.error('Config file not loaded properly');
    }

    // ============================================
    // GLOBAL VARIABLES
    // ============================================
    let selectedProduct = null;
    let currentMessage = "";
    let CONFIG = typeof KANSHI_CONFIG !== 'undefined' ? KANSHI_CONFIG : null;
    
    const INSTA_DIRECT_URL = CONFIG ? `https://www.instagram.com/direct/t/${CONFIG.INSTAGRAM_DIRECT_ID}/` : "https://www.instagram.com/";
    
    // ============================================
    // INITIALIZE PAGE WITH CONFIG
    // ============================================
    function initializePage() {
        if (!CONFIG) return;
        
        // Set Logo
        const logoImg = document.getElementById('logoImg');
        if (logoImg) logoImg.src = CONFIG.LOGO_URL;
        
        // Set Store Info
        document.getElementById('storeName').innerHTML = CONFIG.STORE_NAME + '<span style="font-weight:300">.</span>';
        document.getElementById('storeTagline').innerText = CONFIG.STORE_TAGLINE;
        
        // Set Hero Image
        if (CONFIG.HERO_IMAGES && CONFIG.HERO_IMAGES.length > 0) {
            document.getElementById('heroImage').src = CONFIG.HERO_IMAGES[0];
        }
        
        // Set Hero Captions
        const captionsContainer = document.getElementById('heroCaptions');
        if (captionsContainer && CONFIG.HERO_CAPTIONS) {
            captionsContainer.innerHTML = CONFIG.HERO_CAPTIONS.map(cap => 
                `<span><i class="fas ${cap.icon}"></i> ${cap.text}</span>`
            ).join('');
        }
        
        // Set Tutorial Steps
        const stepsContainer = document.getElementById('stepsGrid');
        if (stepsContainer && CONFIG.TUTORIAL_STEPS) {
            stepsContainer.innerHTML = CONFIG.TUTORIAL_STEPS.map(step => `
                <div class="step-card">
                    <div class="step-number">${step.number}</div>
                    <i class="fas ${step.icon}"></i>
                    <h4>${step.title}</h4>
                    <p>${step.description}</p>
                </div>
            `).join('');
        }
        
        // Set Footer
        document.getElementById('footerText').innerText = CONFIG.FOOTER_TEXT;
        document.getElementById('footerSubtext').innerText = CONFIG.FOOTER_SUBTEXT;
        
        // Set Modal Logo
        document.getElementById('modalLogo').src = CONFIG.LOGO_URL;
        
        // Render Products
        renderProducts();
    }
    
    // ============================================
    // RENDER PRODUCTS FROM CONFIG
    // ============================================
    function renderProducts() {
        const grid = document.getElementById("productGrid");
        if (!grid || !CONFIG) return;
        
        const availableProducts = CONFIG.PRODUCTS.filter(p => p.isAvailable !== false);
        
        grid.innerHTML = "";
        availableProducts.forEach(prod => {
            const card = document.createElement("div");
            card.className = "product-card";
            const stockHtml = prod.stock ? `<div class="stock-badge"><i class="fas fa-box"></i> Stok: ${prod.stock}</div>` : '';
            card.innerHTML = `
                <img class="product-img" src="${prod.img}" alt="${prod.name}" loading="lazy" onerror="this.src='https://placehold.co/500x500?text=KanshiCraft'">
                <div class="product-info">
                    <div class="product-title">${prod.name}</div>
                    <div class="product-desc">${prod.desc}</div>
                    ${stockHtml}
                    <div class="price">${prod.price}</div>
                    <button class="buy-btn" data-id="${prod.id}" ${prod.stock === 0 ? 'disabled' : ''}>
                        <i class="fab fa-instagram" style="margin-right: 8px;"></i> 
                        ${prod.stock === 0 ? 'Stok Habis' : 'Beli via DM'}
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });
        
        document.querySelectorAll(".buy-btn:not(:disabled)").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.getAttribute("data-id"));
                const product = CONFIG.PRODUCTS.find(p => p.id === id);
                if (product && product.isAvailable !== false) openModalWithProduct(product);
            });
        });
    }
    
    // ============================================
    // MODAL FUNCTIONS
    // ============================================
    function formatMessage(product) {
        if (CONFIG && CONFIG.getMessageTemplate) {
            return CONFIG.getMessageTemplate(product);
        }
        // Fallback message
        const date = new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
        return `✨ KARTU PEMBELI KANSHI ✨\n\n🌸 Halo Kak! Saya tertarik dengan produk ini:\n\n📌 ${product.name}\n💰 ${product.price}\n\n📅 ${date}\n\n— Pembeli dari Kanshi Craft`;
    }
    
    function openModalWithProduct(product) {
        selectedProduct = product;
        currentMessage = formatMessage(product);
        const modal = document.getElementById("orderModal");
        const summaryDiv = document.getElementById("orderSummary");
        
        const categoryLabel = product.category === "menggambar" ? "🎨 Menggambar / Lukis" : 
                             (product.category === "boneka" ? "🧸 Boneka Tangan" : "💍 Aksesoris");
        
        summaryDiv.innerHTML = `
            <p><span>🖌️ Produk</span><span><strong>${product.name}</strong></span></p>
            <p><span>🏷️ Harga</span><span><strong>${product.price}</strong></span></p>
            <p><span>📦 Kategori</span><span>${categoryLabel}</span></p>
            <p><span>⭐ Est. pengiriman</span><span>${CONFIG ? CONFIG.SHIPPING_ESTIMATE : '5-7 hari kerja'}</span></p>
        `;
        document.getElementById("fullMessageText").innerText = currentMessage;
        modal.style.display = "flex";
    }
    
    function showToast(msg) {
        const existing = document.querySelector('.custom-toast');
        if(existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'custom-toast';
        toast.innerHTML = `<i class="fab fa-instagram" style="margin-right: 10px;"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function openInstagramAndPaste() {
        if (currentMessage) {
            navigator.clipboard.writeText(currentMessage).then(() => {
                window.open(INSTA_DIRECT_URL, '_blank');
                showToast("✨ Pesan tersalin! Buka DM Instagram, tekan & tempel (paste) lalu kirim ✨");
            }).catch(() => {
                window.open(INSTA_DIRECT_URL, '_blank');
                alert("Pesan sudah siap. Silakan salin manual:\n\n" + currentMessage);
            });
        } else {
            window.open(INSTA_DIRECT_URL, '_blank');
        }
        closeModal();
    }
    
    function closeModal() {
        const modal = document.getElementById("orderModal");
        if(modal) modal.style.display = "none";
        selectedProduct = null;
        currentMessage = "";
    }
    
    // ============================================
    // EVENT LISTENERS
    // ============================================
    document.getElementById("copyMessageBtn")?.addEventListener("click", () => {
        if (currentMessage) {
            navigator.clipboard.writeText(currentMessage).then(() => {
                showToast("✅ Pesan sudah disalin! Sekarang buka Instagram DM dan tempel (paste).");
            }).catch(() => {
                alert("Gagal menyalin, silakan salin manual.");
            });
        }
    });
    
    document.getElementById("openIgBtn")?.addEventListener("click", openInstagramAndPaste);
    document.getElementById("cancelModalBtn")?.addEventListener("click", closeModal);
    
    window.addEventListener("click", (e) => {
        const modal = document.getElementById("orderModal");
        if (e.target === modal) closeModal();
    });
    
    // Initialize when config is loaded
    if (typeof CONFIG !== 'undefined') {
        initializePage();
    } else {
        // Fallback jika config belum load
        window.addEventListener('load', () => {
            if (typeof KANSHI_CONFIG !== 'undefined') {
                CONFIG = KANSHI_CONFIG;
                initializePage();
            }
        });
    }
</script>
</body>
</html>
